spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: never

app:
  security:
    encryption-key: ${APP_ENCRYPTION_KEY}

server:
  forward-headers-strategy: framework

logging:
  level:
    root: INFO
    com.sellerinsight: INFO