spring:
  application:
    name: sellerinsight
  profiles:
    default: local
  lifecycle:
    timeout-per-shutdown-phase: 20s
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  shutdown: graceful
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  show-actuator: false

naver-commerce:
  auth:
    base-url: https://api.commerce.naver.com
    token-path: /external/v1/oauth2/token
    connect-timeout-ms: 3000
    read-timeout-seconds: 5

app:
  pipeline:
    daily:
      enabled: true
      cron: 0 5 2 * * *

logging:
  level:
    root: INFO
    com.sellerinsight: INFO