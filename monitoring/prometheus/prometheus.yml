global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: sellerinsight-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
        labels:
          application: sellerinsight
          environment: local

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100

  - job_name: alloy
    static_configs:
      - targets:
          - alloy:12345