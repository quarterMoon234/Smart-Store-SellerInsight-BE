name: TEST
description: 테스트 코드 또는 테스트 환경 이슈
title: "[TEST] "
labels:
  - test
body:
  - type: textarea
    id: summary
    attributes:
      label: 작업 요약
      description: 어떤 테스트를 추가하거나 정비할지 적어주세요.
      placeholder: 주문 서비스 단위 테스트와 JPA 슬라이스 테스트를 추가합니다.
    validations:
      required: true

  - type: textarea
    id: done-criteria
    attributes:
      label: 완료 기준
      description: 완료 기준만 짧게 적어주세요.
      placeholder: |
        - 주문 서비스 테스트 추가
        - 실패 케이스 테스트 추가
    validations:
      required: true
