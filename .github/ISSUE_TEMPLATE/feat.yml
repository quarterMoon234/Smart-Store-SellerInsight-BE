name: FEAT
description: 기능 개발 이슈
title: "[FEAT] "
labels:
  - feat
body:
  - type: textarea
    id: summary
    attributes:
      label: 작업 요약
      description: 만들 기능을 한두 문장으로 적어주세요.
      placeholder: 판매자 연동용 토큰 발급 API를 추가합니다.
    validations:
      required: true

  - type: textarea
    id: done-criteria
    attributes:
      label: 완료 기준
      description: 완료 기준만 짧게 적어주세요.
      placeholder: |
        - 토큰 발급 API 구현
        - 요청/응답 DTO 추가
        - 정상/예외 테스트 추가
    validations:
      required: true
