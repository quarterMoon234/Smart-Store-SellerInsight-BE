name: TASK
description: 설정, 리팩터링, 문서화, 운영 작업 이슈
title: "[TASK] "
labels:
  - task
body:
  - type: textarea
    id: summary
    attributes:
      label: 작업 요약
      description: 작업 내용을 한두 문장으로 적어주세요.
      placeholder: Git hook과 PR 템플릿을 추가합니다.
    validations:
      required: true

  - type: textarea
    id: done-criteria
    attributes:
      label: 완료 기준
      description: 완료 기준만 짧게 적어주세요.
      placeholder: |
        - hook 스크립트 추가
        - PR 템플릿 추가
        - 동작 확인
    validations:
      required: true
