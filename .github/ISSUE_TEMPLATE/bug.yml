name: BUG
description: 버그 수정 이슈
title: "[BUG] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 작업 요약
      description: 현재 문제를 한두 문장으로 적어주세요.
      placeholder: 주문 동기화 중 null 응답 처리 없이 예외가 발생합니다.
    validations:
      required: true

  - type: textarea
    id: done-criteria
    attributes:
      label: 완료 기준
      description: 완료 기준만 짧게 적어주세요.
      placeholder: |
        - null 응답 처리 추가
        - 재현 테스트 추가
    validations:
      required: true
